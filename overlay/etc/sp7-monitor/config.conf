# SP7 Wireless Monitor Configuration
# This file is sourced by the sp7-monitor control script
# Edit these values to set defaults, or use command-line args to override

# Host PC IP address (leave empty for auto-discovery)
#host=192.168.1.100

# Video streaming port (RTP)
video_port=5004

# Input event port (UDP)
input_port=5005

# Extra arguments passed to the receiver
# --no-input          Disable input forwarding (video only)
# --width 1920        Override display width
# --height 1080       Override display height
extra_args=--verbose
