# SP7 Wireless Monitor - Kernel Module Configuration
# Optimized for low-latency wireless display operation

# Disable Intel WiFi power saving for lowest latency
options iwlwifi power_save=0 uapsd_disable=1 bt_coex_active=0
options iwlmvm power_scheme=1

# Intel graphics - enable performance mode
options i915 enable_guc=3 enable_fbc=1 enable_psr=0

# Load surface modules at boot
softdep surface_aggregator pre: intel_ipts
softdep surface_hid pre: surface_aggregator
